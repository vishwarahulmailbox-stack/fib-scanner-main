name: FIB Scanner

on:
  schedule: 
    - cron: '30 5 * * 1-5'    # 02:00 PM IST  Mon-Fri

  # Manual run button bhi hoga GitHub pe
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas numpy pytz

      - name: Run FIB Scanner
        run: python fib_scanner.py

      - name: Commit docs to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git commit -m "FIB Scanner update — ${{ github.run_number }}"
          git push origin main
          
